services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3080:80"
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      # Traefik / Dokploy routing for arcwright.space
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.arcwright.rule=Host(`arcwright.space`)"
      - "traefik.http.routers.arcwright.entrypoints=websecure"
      - "traefik.http.routers.arcwright.tls.certresolver=letsencrypt"
      - "traefik.http.services.arcwright.loadbalancer.server.port=80"
      # www redirect
      - "traefik.http.routers.arcwright-www.rule=Host(`www.arcwright.space`)"
      - "traefik.http.routers.arcwright-www.entrypoints=websecure"
      - "traefik.http.routers.arcwright-www.middlewares=arcwright-www-redirect"
      - "traefik.http.middlewares.arcwright-www-redirect.redirectregex.regex=^https://www\\.arcwright\\.space(.*)"
      - "traefik.http.middlewares.arcwright-www-redirect.redirectregex.replacement=https://arcwright.space$${1}"
      - "traefik.http.middlewares.arcwright-www-redirect.redirectregex.permanent=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  dokploy-network:
    external: true
