module_name: squidhub
version: "1.0.0"
description: |
  Project-local BMAD module for the Squidhub 2.1 repository.
  Contains session orchestration agents specific to this project.

agents:
  - name: squid-master
    path: _bmad/agents/squid-master/squid-master.md
    hasSidecar: true
    sidecar-path: _bmad/_memory/squid-master-sidecar/

bmm_dependencies:
  - analyst
  - architect
  - dev
  - pm
  - qa
  - quick-flow-solo-dev
  - sm
  - tech-writer
  - ux-designer

notes: |
  This module identifier (squidhub) is intentionally project-local and does not
  correspond to a standard BMAD module value (stand-alone, bmm, cis, bmgd).
  Agents in this module have access to all bmm agents listed in bmm_dependencies.
